<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImPoster</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 15px #00ff00; text-align: center; background: #000; width: 90%; max-width: 400px; border-radius: 5px; }
        h2 { margin-top: 0; letter-spacing: 2px; font-weight: bold; text-transform: none; }
        input { margin: 15px 0; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 8px; width: 100%; box-sizing: border-box; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
        #result { margin-top: 20px; display: none; }
        textarea { width: 100%; height: 80px; background: #111; color: #00ff00; border: 1px solid #00ff00; margin-top: 5px; resize: none; box-sizing: border-box; padding: 10px; font-size: 12px; }
        .status { font-size: 12px; margin-bottom: 10px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <h2>ImPoster</h2>
        <div class="status">Сервис хостинга изображений</div>
        <input type="file" id="fileInput" accept="image/*">
        <button id="uploadBtn" onclick="uploadImage()">ЗАГРУЗИТЬ НА СЕРВЕР</button>
        
        <div id="result">
            <textarea id="bbcode" readonly></textarea>
            <button onclick="copyCode()" style="margin-top:10px; background: #333; color: #00ff00; border: 1px solid #00ff00;">СКОПИРОВАТЬ КОД</button>
        </div>
    </div>

    <script>
        const API_KEY = '683bf63eca1dcda6d0a46c4bf92e00c5';

        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('uploadBtn');
            const originalBtnText = "ЗАГРУЗИТЬ НА СЕРВЕР";
            
            if (!fileInput.files[0]) {
                alert('Сначала выберите файл!');
                return;
            }

            btn.innerText = 'ЗАГРУЗКА...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    const imgUrl = data.data.url;
                    const bbCode = `[url=${imgUrl}][img]${imgUrl}[/img][/url]`;
                    document.getElementById('bbcode').value = bbCode;
                    document.getElementById('result').style.display = 'block';
                } else {
                    alert('Ошибка загрузки');
                }
            } catch (err) {
                alert('Ошибка сети');
            } finally {
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        }

        function copyCode() {
            const copyText = document.getElementById('bbcode');
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Код успешно скопирован!");
        }
    </script>
</body>
</html>
